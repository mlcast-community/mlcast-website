name: Deploy to GitHub Pages

on:
  push:
    branches: ['main', 'gabriele_doc_web_fix']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs for the same ref
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- React (Vite) site -> dist/ ---
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

      # --- MyST / Jupyter Book docs -> dist/docs/ ---
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'
      - name: Build Jupyter Book
        env:
          # Served under <pages-url>/docs, so links must resolve against that subpath
          BASE_URL: /mlcast-website/docs
        run: uv run jupyter book build --html --ci
      - name: Stage book into site
        run: |
          echo "=== _build tree ==="
          find _build -maxdepth 2 || true
          if [ ! -f _build/html/index.html ]; then
            echo "::error::_build/html/index.html missing — book build produced no static HTML"
            exit 1
          fi
          mkdir -p dist/docs
          cp -r _build/html/. dist/docs/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
