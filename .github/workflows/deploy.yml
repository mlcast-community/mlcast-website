name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  # PRs run the build job only (see the deploy job's `if`) so breakage is
  # caught before merge instead of on the production deploy.
  pull_request:
    branches: ['main']
  workflow_dispatch:
  schedule:
    # Daily 06:00 UTC — refresh community stats even without pushes.
    - cron: '0 6 * * *'

# Job-level permissions grant the rest: the build job runs repo scripts and
# freshly-resolved PyPI packages, so it must not hold deploy credentials.
permissions:
  contents: read

# One concurrency group per ref: PR builds never cancel a production deploy.
# Production runs queue rather than cancel so an in-flight deploy completes.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Static site (repo root) -> dist/ ---
      - name: Assemble static site
        run: |
          mkdir -p dist
          cp -r *.html *.css *.js img video public dist/
          # Site entry point: home.html is the landing page; the nav brand
          # links to index.html, so publish home.html as index.html too.
          cp dist/home.html dist/index.html
          # Serve the icon at the web root too: browsers (notably Firefox)
          # auto-request /favicon.ico regardless of the <link> tag.
          cp public/favicon.ico dist/favicon.ico

      # --- Community stats fetched at build time (authenticated: 5000 req/hr) ---
      - name: Fetch GitHub community stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/fetch-gh-stats.sh mlcast-community dist/gh-stats.json

      # --- "Good first issue" list fetched at build time (same rationale) ---
      - name: Fetch GitHub good-first-issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/fetch-gh-issues.sh mlcast-community dist/gh-issues.json

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      # --- Catalog data: dataset list, per-country map markers, and impact
      #     stats (Zarr metadata + the tiny x/y coord arrays for resolution;
      #     never the bulk data). Feeds data.html's dataset list + spotlight
      #     and the home/contributing coverage maps.
      #     Marker positions are read from the staged dist/img/world.svg via
      #     svgpathtools, and its covered-country highlight rule is rewritten in
      #     place — so this must run after img/ is copied into dist/. ---
      - name: Compute catalog data
        run: |
          uv run python scripts/fetch-catalog-stats.py \
            "https://raw.githubusercontent.com/mlcast-community/mlcast-datasets/main/src/mlcast_datasets/catalog/precipitation/catalog.yml" \
            dist/catalog-data.json \
            dist/img/world.svg

      # --- MyST / Jupyter Book docs -> dist/docs/ ---
      - name: Build Jupyter Book
        env:
          # The site serves at the custom domain mlcast.org (Pages settings),
          # so the book lives at mlcast.org/docs — no repo-name subpath.
          BASE_URL: /docs
        run: uv run jupyter book build --html --ci
      - name: Stage book into site
        run: |
          echo "=== _build tree ==="
          find _build -maxdepth 2 || true
          if [ ! -f _build/html/index.html ]; then
            echo "::error::_build/html/index.html missing — book build produced no static HTML"
            exit 1
          fi
          mkdir -p dist/docs
          cp -r _build/html/. dist/docs/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    # PRs only validate the build; deploying is for main (push/schedule/manual).
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
